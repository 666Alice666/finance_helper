<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for( 'static', filename='main.css')}}">
    <title>Student Helper</title>
</head>
<body>
    <div class="container">
        <aside class="left-section">
            <h1>Финансовый помощник</h1>
            <div class="sidebar">
                <a id="active" href="{{ url_for('main')}}">Главная</a>
                <a href="{{ url_for('history')}}">История</a>
                <a href="{{ url_for('statistics')}}">Статистика</a>
                <a href="{{ url_for('debts')}}">Кредиты и займы</a>
            </div>
        </aside>

                <main>
            <div class="adder">

                <div class="item">
                    <div class="item-income">
                        <form method="POST" action="{{ url_for('add_transaction') }}">
                            <p>Доход</p>
                            <input type="hidden" name="type" value="income">

                            <label for="category-in">Категория:</label>
                            <select name="category" id="category-in" required>
                                {% for cat in income_cats %}
                                    <option value="{{ cat.name }}">{{ cat.name }}</option>
                                {% endfor %}
                                {% if not income_cats %}
                                    <option value="" disabled>Сначала добавьте категорию ↓</option>
                                {% endif %}
                            </select>

                            <input type="number" name="amount" min="1" placeholder="Руб" required>
                            <input type="text" name="description" placeholder="Комментарий (необязательно)">

                            <button type="submit">Добавить</button>
                        </form>

                        <form method="POST" action="{{ url_for('add_category') }}">
                            <p>Добавить категорию</p>
                            <input type="hidden" name="type" value="income">
                            <input type="text" name="name" placeholder="Название категории" required>
                            <button type="submit">Добавить</button>
                        </form>
                    </div>
                </div>

                <!-- === ФОРМА РАСХОДА === -->
                <div class="item">
                    <div class="item-outcome">
                        <form method="POST" action="{{ url_for('add_transaction') }}">
                            <p>Трата</p>
                            <input type="hidden" name="type" value="expense">

                            <label for="category-out">Категория:</label>
                            <select name="category" id="category-out" required>
                                {% for cat in expense_cats %}
                                    <option value="{{ cat.name }}">{{ cat.name }}</option>
                                {% endfor %}
                                {% if not expense_cats %}
                                    <option value="" disabled>Сначала добавьте категорию ↓</option>
                                {% endif %}
                            </select>

                            <input type="number" name="amount" min="1" placeholder="Руб" required>
                            <input type="text" name="description" placeholder="Комментарий (необязательно)">

                            <button type="submit">Добавить</button>
                        </form>

                        <form method="POST" action="{{ url_for('add_category') }}">
                            <p>Добавить категорию</p>
                            <input type="hidden" name="type" value="expense">
                            <input type="text" name="name" placeholder="Название категории" required>
                            <button type="submit">Добавить</button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

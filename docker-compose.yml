version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: finance_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://finance_user:secure_password_123@db:5432/finance_db
      - SECRET_KEY=my-super-secret-key-for-docker
      - FLASK_DEBUG=0
    depends_on:
      - db

volumes:
  pgdata: